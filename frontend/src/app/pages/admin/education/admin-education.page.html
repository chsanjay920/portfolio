<section class="admin-page">
  <h1>Education</h1>
  <p class="muted">Manage degrees, institutions, and details (Markdown allowed).</p>

  @if (error()) {
    <div class="error">{{ error() }}</div>
  }

  <div class="grid">
    <div class="card">
      <div class="actions">
        <button type="button" (click)="reload()">Refresh</button>
        <button class="primary" type="button" (click)="newItem()">New entry</button>
      </div>
      <div class="list" style="margin-top: 12px;">
        @for (e of items(); track e._id) {
          <div class="list-item">
            <div style="min-width: 0;">
              <div class="list-title">{{ e.degree }}</div>
              <div class="list-sub">{{ e.institution }} · {{ e.duration }}</div>
            </div>
            <div class="actions">
              <button type="button" (click)="select(e)">Edit</button>
              <button type="button" (click)="remove(e)">Delete</button>
            </div>
          </div>
        }
      </div>
    </div>

    <div class="card">
      <form [formGroup]="form" (ngSubmit)="save()" class="grid">
        <div class="row">
          <label>Degree</label>
          <input formControlName="degree" />
        </div>
        <div class="row">
          <label>Institution</label>
          <input formControlName="institution" />
        </div>
        <div class="row">
          <label>Duration</label>
          <input formControlName="duration" placeholder="2018-08 to 2022-05" />
        </div>
        <div class="row">
          <label>Details (Markdown)</label>
          <textarea formControlName="details"></textarea>
        </div>

        <div class="actions">
          <button class="primary" type="submit" [disabled]="saving()">{{ saving() ? 'Saving…' : 'Save' }}</button>
        </div>
      </form>
    </div>
  </div>
</section>
