<app-breadcrumbs [items]="breadcrumbs" />
<app-section-header
  title="Project Ideas"
  subtitle="Good ideas today can become real builds tomorrow."
/>

<div class="card-grid">
  @for (p of ideas(); track p.slug) {
    <app-entry-card
      [title]="p.title"
      [description]="p.summary"
      [tags]="p.tags"
      [internalRoute]="'/project-ideas/' + p.slug"
      [externalLinks]="p.links"
      [imageSrc]="p.image"
    />
  }
</div>
