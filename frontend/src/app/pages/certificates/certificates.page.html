<app-breadcrumbs [items]="breadcrumbs" />
<app-section-header
  title="Certificates"
  subtitle="Credentials and courses that strengthen the fundamentals."
/>

<div class="card-grid">
  @if (loading()) {
    @for (i of [1, 2, 3]; track i) {
      <article class="entry-card skeleton-card">
        <div class="skeleton skeleton-image"></div>
        <div class="skeleton skeleton-title"></div>
        <div class="skeleton skeleton-line short"></div>
        <div class="skeleton skeleton-tags"></div>
      </article>
    }
  } @else {
    @for (c of items(); track c.slug) {
      <app-entry-card
        [title]="c.title"
        [description]="c.summary"
        [date]="c.date"
        [tags]="c.tags"
        [internalRoute]="'/certificates/' + c.slug"
        [externalLinks]="c.links"
        [imageSrc]="c.image"
      />
    }
  }
</div>
