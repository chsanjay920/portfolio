<app-breadcrumbs [items]="breadcrumbs" />
<app-section-header title="Experience" subtitle="Roles and work history." />

<div class="timeline">
  @if (loading()) {
    @for (i of [1, 2, 3]; track i) {
      <section class="timeline-item skeleton-timeline">
        <div class="timeline-left">
          <div class="timeline-dot"></div>
          <div class="timeline-line"></div>
        </div>

        <div class="timeline-content">
          <div class="skeleton skeleton-title"></div>
          <div class="skeleton skeleton-date short"></div>
          <div class="skeleton skeleton-line"></div>
          <div class="skeleton skeleton-line"></div>
        </div>
      </section>
    }
  } @else {
    @for (e of items(); track e.id) {
      <section class="timeline-item" [id]="e.id">
        <div class="timeline-left">
          <div class="timeline-dot"></div>
          <div class="timeline-line"></div>
        </div>

        <div class="timeline-content">
          <h3 class="timeline-title">{{ e.title }}</h3>
          <div class="timeline-org">{{ e.organization }}</div>
          <div class="timeline-duration">
            @if (e.end) {
              {{ e.start }} — {{ e.end }}
            } @else {
              {{ e.start }}
            }
          </div>
          <div class="timeline-description" [innerHTML]="e.description | markdownHtml"></div>
        </div>
      </section>
    }
  }
</div>
