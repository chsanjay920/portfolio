@if (loading()) {
  <article class="article article--skeleton">
    <app-breadcrumbs [items]="breadcrumbs" />
    <div class="article-top">
      <div class="skeleton skeleton-line short"></div>
    </div>

    <div class="skeleton skeleton-title"></div>
    <div class="skeleton skeleton-subtitle short"></div>
    <div class="skeleton skeleton-image hero"></div>

    <div class="article-meta">
      <div class="skeleton skeleton-date short"></div>
      <div class="skeleton skeleton-tags"></div>
    </div>

    <div class="article-content">
      @for (i of [1, 2, 3]; track i) {
        <div class="skeleton skeleton-block"></div>
      }
    </div>
  </article>
} @else if (post()) {
  <article class="article">
    <app-breadcrumbs [items]="breadcrumbs" />
    <div class="article-top">
      <a class="back-link" routerLink="/blogs">{{ backLabel }}</a>
    </div>

    <h1 class="article-title">{{ post()!.title }}</h1>

    <app-content-image [src]="post()!.image" [alt]="post()!.title + ' image'" variant="hero" />

    <div class="article-meta">
      <span class="article-date">{{ post()!.date }}</span>
      <div class="article-tags">
        @for (t of post()!.tags; track t) {
          <app-tag-pill [label]="t" />
        }
      </div>
    </div>

    <div class="article-content" (click)="copyCode($event)" [innerHTML]="post()!.content | markdownHtml"></div>
  </article>
} @else {
  <app-breadcrumbs [items]="breadcrumbs" />
  <div class="empty-state">
    <h2>Blog not found</h2>
    <a routerLink="/blogs">Back to Blogs</a>
  </div>
}
