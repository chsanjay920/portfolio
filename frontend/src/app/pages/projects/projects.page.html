<app-breadcrumbs [items]="breadcrumbs" />
<app-section-header
  title="Projects"
  subtitle="Selected builds with links to GitHub/demo when available."
/>

<div class="card-grid">
  @if (loading()) {
    @for (i of [1, 2, 3]; track i) {
      <article class="entry-card skeleton-card">
        <div class="skeleton skeleton-image"></div>
        <div class="skeleton skeleton-title"></div>
        <div class="skeleton skeleton-line short"></div>
        <div class="skeleton skeleton-tags"></div>
      </article>
    }
  } @else {
    @for (p of posts(); track p.slug) {
      <app-entry-card
        [title]="p.title"
        [description]="p.summary"
        [date]="p.date"
        [tags]="p.tags"
        [internalRoute]="'/projects/' + p.slug"
        [externalLinks]="p.links"
        [imageSrc]="p.image"
      />
    }
  }
</div>
