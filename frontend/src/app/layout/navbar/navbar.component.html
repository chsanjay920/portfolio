<header class="site-header">
  <div class="nav-inner">
    <a class="brand" routerLink="/" (click)="onNavClick()">
      {{ brand() }}
    </a>

    <button
      class="burger"
      type="button"
      aria-label="Open navigation"
      aria-expanded="{{ menuOpen }}"
      (click)="menuOpen = !menuOpen"
    >
      <span class="burger-line"></span>
      <span class="burger-line"></span>
      <span class="burger-line"></span>
    </button>

    <nav class="nav-links" [class.open]="menuOpen">
      @for (item of navItems; track item.href) {
        <a class="nav-link" [routerLink]="item.href" (click)="onNavClick()">
          {{ item.label }}
        </a>
      }
      <a class="nav-link nav-link--search" routerLink="/search" (click)="onNavClick()">
        Search
      </a>
    </nav>
  </div>
  <div class="nav-divider"></div>
</header>
